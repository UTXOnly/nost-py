version: '2.1'

services:
  relay:
    container_name: relay
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8008:8008"
    environment:
      - DD_AGENT_HOST="nostpyrelay"
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_DB=nostpy
      - POSTGRES_USER=nostpy
      - POSTGRES_PASSWORD=nostpy
      - DATABASE_URL=postgresql://nostpy:nostpy@postgres:5432/nostpy
      - SQLALCHEMY_SILENCE_UBER_WARNING=1
    volumes:
      - ./errors:/errors
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      relay-network:
        ipv4_address: 172.20.0.2


  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_DB=nostpy
      - POSTGRES_USER=nostpy
      - POSTGRES_PASSWORD=nostpy
    ports:
      - 5432:5432

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nostpy"] # database username here - nostr, should be changed if other user
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      relay-network:
        ipv4_address: 172.20.0.3

  nginx:
    user: root
    build: 
      context: .
      dockerfile: Dockerfile.nginx

    container_name: nginx-reverse-proxy
    ports:
      - 80:80
      - 443:443
    command: sh -c "/etc/nginx/init.sh"
    #volumes:
    #  - ./nginx/:/etc/nginx/:rw
    networks:
      relay-network:
        ipv4_address: 172.20.0.4
