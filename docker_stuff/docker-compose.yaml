version: '3.8'

services:
  relay:
    container_name: relay
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8008:8008"
    environment:
      - DD_AGENT_HOST="nostpyrelay"
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SQLALCHEMY_SILENCE_UBER_WARNING=1
    volumes:
      - ./errors:/errors
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      relay-network:
        ipv4_address: 172.20.0.2


  postgres:
    image: dhis2/postgres-contrib:latest
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      #- POSTGRES_INITDB_ARGS=--extension=jsonb_ops
    ports:
      - 5432:5432
    #volumes:
    # # - ${PWD}/pgdata:/var/lib/postgresql/data-old
    # # - ${PWD}/data:/var/lib/postgresql/data
    # # - ${PWD}/db-logs:/var/log/postgresql
    #  - ${PWD}/postgresql.conf:/postgresql.conf
    #command: postgres -c 'config_file=/postgresql.conf'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nostr"] # database username here - nostr, should be changed if other user
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      relay-network:
        ipv4_address: 172.20.0.3


networks:
  relay-network:
    ipam:
      config:
        - subnet: 172.20.0.0/24