version: '3.8'

services:
  relay:
    container_name: relay
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8008:8008"
    environment:
      - DD_AGENT_HOST="nostpyrelay"
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SQLALCHEMY_SILENCE_UBER_WARNING=1
    volumes:
      - ./errors:/errors
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      relay-network:
        ipv4_address: 172.20.0.2


  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      #- POSTGRES_INITDB_ARGS=--extension=jsonb_ops
    ports:
      - 5432:5432

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nostr"] # database username here - nostr, should be changed if other user
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      relay-network:
        ipv4_address: 172.20.0.3

  nginx:
    build: 
      context: .
      dockerfile: Dockerfile.nginx
      args:
        NOSTR_DOMAIN: ${NOSTR_DOMAIN}
        EMAIL: ${EMAIL}
    environment:
      - NOSTR_DOMAIN=${NOSTR_DOMAIN}
      - PROXY_PASS_IP=${PROXY_PASS_IP}
      - PORT=${PORT}
    container_name: nginx-reverse-proxy
    ports:
      - 80:80
      - 443:443
    command: ash -c "envsubst < /etc/nginx/sites-available/default_holder > /etc/nginx/sites-available/default && nginx -g 'daemon off;'"
    networks:
      default:
        ipv4_address: 172.20.0.4
networks:
  relay-network:
    ipam:
      config:
        - subnet: 172.20.0.0/24