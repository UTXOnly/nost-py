version: '3.8'

services:
  relay:
    container_name: relay
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8008:8008"
    environment:
      - DD_AGENT_HOST="nostpyrelay"
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SQLALCHEMY_SILENCE_UBER_WARNING=1
    volumes:
      - ./errors:/errors
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      relay-network:
        ipv4_address: 172.20.0.2

  datadog-agent:
    container_name: datadog-agent
    image: datadog/agent:latest
    environment:
      ## GLOBALS
    - DD_API_KEY=${DD_API_KEY}
    - DD_SITE=datadoghq.com
    - DD_HOSTNAME=nostpy
    - DD_TAGS=env:nostr owner:brian service:relay
    - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
    - DD_DOCKER_LABELS_AS_TAGS=true
    - DD_DOCKER_ENV_AS_TAGS=true
    - DD_SYSTEM_PROBE_ENABLED=true
    - DD_PROCESS_AGENT_ENABLED=true
    - DD_APM_NON_LOCAL_TRAFFIC-true
    - DD_LOGS_ENABLED=true
    - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
    ports:
      - 8126:8126
      - 8125:8125
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - /proc/:/host/proc/:ro
    - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
    - /sys/kernel/debug:/sys/kernel/debug
    cap_add:
    - SYS_ADMIN
    - SYS_RESOURCE
    - SYS_PTRACE
    - NET_ADMIN
    - NET_BROADCAST
    - NET_RAW
    - IPC_LOCK
    - CHOWN
    security_opt:
    - apparmor:unconfined
    networks:
      relay-network:
        ipv4_address: 172.20.0.4


  postgres:
    image: dhis2/postgres-contrib:latest
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      #- POSTGRES_INITDB_ARGS=--extension=jsonb_ops
    ports:
      - 5432:5432
    #volumes:
    # # - ${PWD}/pgdata:/var/lib/postgresql/data-old
    # # - ${PWD}/data:/var/lib/postgresql/data
    # # - ${PWD}/db-logs:/var/log/postgresql
    #  - ${PWD}/postgresql.conf:/postgresql.conf
    #command: postgres -c 'config_file=/postgresql.conf'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nostr"] # database username here - nostr, should be changed if other user
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      relay-network:
        ipv4_address: 172.20.0.3


networks:
  relay-network:
    ipam:
      config:
        - subnet: 172.20.0.0/24